<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie Express</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
}

header{
    background:#dd3400;
    color:white;
    text-align:center;
    padding:20px;
    font-size:35px;
    font-weight:bold;
    box-shadow:0 3px 10px rgba(0, 0, 0, 0.2);
}

.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    padding:30px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:#ff5722;
    font-size:22px;
    font-weight:bold;
}

button{
    margin-top:12px;
    background:#ff5722;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:25px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    background:#e64a19;
}

.cart{
    width:90%;
    max-width:700px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.cart h2{
    text-align:center;
    color:#ff5722;
    margin-bottom:15px;
}

#cartItems li{
    padding:10px;
    border-bottom:1px solid #ddd;
    list-style:none;
}

.total{
    margin-top:15px;
    text-align:right;
    font-size:22px;
    font-weight:bold;
    color:green;
}

.clear-btn{
    display:block;
    margin:15px auto 0;
    background:red;
}

.clear-btn:hover{
    background:darkred;
}
</style>
</head>

<body>

<header>
Foodie Express
</header>

<div class="container">

    <div class="card">
        <img src="https://img.freepik.com/premium-photo/delicious-cheese-pizza-with-additional-cheese-that-looks-beautiful-generative-ai_1219132-3177.jpg" alt="Pizza">
        <div class="card-content">
            <h3>Cheese Pizza</h3>
            <p class="price">₹299</p>
            <button onclick="addToCart('Cheese Pizza',299)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600" alt="Burger">
        <div class="card-content">
            <h3>Burger</h3>
            <p class="price">₹100</p>
            <button onclick="addToCart('Burger',149)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600" alt="Pasta">
        <div class="card-content">
            <h3>White Sauce Pasta</h3>
            <p class="price">₹149</p>
            <button onclick="addToCart('White Sauce Pasta',199)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://img.freepik.com/premium-photo/closeup-flavorful-veg-momos-white-background-momos-picture_1020697-137345.jpg?w=740" alt="Momos">
        <div class="card-content">
            <h3>Momos</h3>
            <p class="price">₹100</p>
            <button onclick="addToCart('Momos',100)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://i.pinimg.com/736x/7b/25/1b/7b251bb07ae146c2521f3adf39215f12.jpg" alt="French Fries">
        <div class="card-content">
            <h3>French Fries</h3>
            <p class="price">₹99</p>
            <button onclick="addToCart('French Fries',99)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=600" alt="Sandwich">
        <div class="card-content">
            <h3>Veg Sandwich</h3>
            <p class="price">₹100</p>
            <button onclick="addToCart('Veg Sandwich',129)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600" alt="Chocolate Cake">
        <div class="card-content">
            <h3>Chocolate Cake</h3>
            <p class="price">₹199</p>
            <button onclick="addToCart('Chocolate Cake',179)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://www.stemilt.com/wp-content/uploads/2019/05/Chocolate-Cherry-Ice-Cream-header-1024x576.jpg" alt="Ice Cream">
        <div class="card-content">
            <h3>Ice Cream</h3>
            <p class="price">₹80</p>
            <button onclick="addToCart('Ice Cream',89)">Add To Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600" alt="Coffee">
        <div class="card-content">
            <h3>Coffee</h3>
            <p class="price">₹70</p>
            <button onclick="addToCart('Coffee',79)">Add To Cart</button>
        </div>
    </div>

</div>

<div class="cart">
    <h2>🛒 Your Cart</h2>

    <ul id="cartItems"></ul>

    <div class="total">
        Total: ₹<span id="total">0</span>
    </div>

    <button class="clear-btn" onclick="clearCart()">
        Clear Cart
    </button>
</div>

<script>

let total = 0;

function addToCart(item, price) {

    let cart = document.getElementById("cartItems");

    let li = document.createElement("li");

    li.textContent = item + " - ₹" + price;

    cart.appendChild(li);

    total += price;

    document.getElementById("total").innerText = total;
}

function clearCart() {

    document.getElementById("cartItems").innerHTML = "";

    total = 0;

    document.getElementById("total").innerText = total;
}

</script>

</body>
</html>
